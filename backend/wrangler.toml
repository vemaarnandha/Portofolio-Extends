name = "portfolio-backend"
main = "src/index.ts"
compatibility_date = "2024-10-22"

# Environment Variables
[vars]
CORS_ORIGIN = "https://vem-ex-worth-less.vercel.app"
# Ganti https://namaproject.vercel.app dengan domain Vercel-mu nanti
# Bisa diisi sementara dulu, nanti di-update lagi setelah frontend deploy
# Secrets (use `wrangler secret put` to set these)
# wrangler secret put JWT_SECRET
# wrangler secret put SUPABASE_URL
# wrangler secret put SUPABASE_ANON_KEY
# wrangler secret put SUPABASE_SERVICE_ROLE
